name: Keep API warm

# F1 unloads the container after ~20 min idle (cold start ≈30 s) and the SQL serverless tier
# auto-pauses. Pinging /health keeps the app loaded; the DB resumes on the first real query.
# Retries so a single slow cold start doesn't mark the check red.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          for i in 1 2 3; do
            if curl -sf --max-time 90 https://shopforge-api-luisgxz.azurewebsites.net/health; then
              echo "OK on attempt $i"; exit 0
            fi
            echo "attempt $i failed, retrying in 20s..."; sleep 20
          done
          echo "health still unreachable after 3 attempts"; exit 1
