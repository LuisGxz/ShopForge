name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      # Inject the Azure API base into <head> before building so the bundle ships pointing at prod.
      - name: Point app at the Azure API
        run: |
          sed -i 's#<head>#<head><script>window.SHOPFORGE_API_BASE="https://shopforge-api-luisgxz.azurewebsites.net";</script>#' src/index.html
          grep -q SHOPFORGE_API_BASE src/index.html

      - name: Build for Pages
        run: npx ng build --configuration production --base-href /ShopForge/

      - name: SPA fallback (404.html)
        run: cp dist/frontend/browser/index.html dist/frontend/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
