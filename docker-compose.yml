# Local development infrastructure. Dev-only credentials — production uses env vars.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shopforge-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ShopForge_Dev!2026"
      MSSQL_PID: Developer
    ports:
      - "14333:1433"
    volumes:
      - shopforge-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'ShopForge_Dev!2026' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  shopforge-sql-data:
